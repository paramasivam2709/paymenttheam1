<!-- 404.html - 404 Error Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; overflow: hidden; }
        .gold-text { background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 50%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .glitch { position: relative; animation: glitch 3s infinite; }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        .particle { position: absolute; background: rgba(212, 175, 55, 0.3); border-radius: 50%; pointer-events: none; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .float { animation: float 6s ease-in-out infinite; }
        .grid-bg { background-image: linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
    </style>
</head>
<body class="antialiased flex items-center justify-center relative">
    <!-- Grid Background -->
    <div class="absolute inset-0 grid-bg"></div>
    
    <!-- Particles -->
    <div id="particles-container" class="absolute inset-0"></div>

    <!-- Content -->
    <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
        <!-- 404 Animation -->
        <div class="mb-8 relative">
            <h1 class="text-[150px] md:text-[200px] font-bold leading-none glitch gold-text opacity-20 absolute inset-0 flex items-center justify-center">404</h1>
            <h1 class="text-[150px] md:text-[200px] font-bold leading-none glitch gold-text relative">404</h1>
        </div>

        <h2 class="text-3xl md:text-5xl font-bold mb-4">Page Not Found</h2>
        <p class="text-gray-400 text-lg md:text-xl mb-8 max-w-2xl mx-auto">Oops! Looks like you've ventured into uncharted territory. The page you're looking for doesn't exist or has been moved.</p>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
            <a href="index.html" class="px-8 py-4 bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-bold rounded-full hover:shadow-lg hover:shadow-yellow-500/40 transform hover:-translate-y-1 transition-all flex items-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Go Home</span>
            </a>
            <button onclick="history.back()" class="px-8 py-4 border border-white/20 text-white font-semibold rounded-full hover:bg-white/10 hover:border-yellow-400 transition-all flex items-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span>Go Back</span>
            </button>
        </div>

        <!-- Quick Links -->
        <div class="mt-12 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-2xl mx-auto">
            <a href="services.html" class="p-4 glass rounded-xl hover:bg-white/10 transition-all group">
                <div class="w-10 h-10 mx-auto mb-2 rounded-full bg-yellow-500/20 flex items-center justify-center group-hover:bg-yellow-500 transition-colors">
                    <svg class="w-5 h-5 text-yellow-400 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="text-sm text-gray-400 group-hover:text-white">Services</span>
            </a>
            <a href="about.html" class="p-4 glass rounded-xl hover:bg-white/10 transition-all group">
                <div class="w-10 h-10 mx-auto mb-2 rounded-full bg-yellow-500/20 flex items-center justify-center group-hover:bg-yellow-500 transition-colors">
                    <svg class="w-5 h-5 text-yellow-400 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <span class="text-sm text-gray-400 group-hover:text-white">About</span>
            </a>
            <a href="blog.html" class="p-4 glass rounded-xl hover:bg-white/10 transition-all group">
                <div class="w-10 h-10 mx-auto mb-2 rounded-full bg-yellow-500/20 flex items-center justify-center group-hover:bg-yellow-500 transition-colors">
                    <svg class="w-5 h-5 text-yellow-400 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                </div>
                <span class="text-sm text-gray-400 group-hover:text-white">Blog</span>
            </a>
            <a href="login.html" class="p-4 glass rounded-xl hover:bg-white/10 transition-all group">
                <div class="w-10 h-10 mx-auto mb-2 rounded-full bg-yellow-500/20 flex items-center justify-center group-hover:bg-yellow-500 transition-colors">
                    <svg class="w-5 h-5 text-yellow-400 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                </div>
                <span class="text-sm text-gray-400 group-hover:text-white">Login</span>
            </a>
        </div>

        <!-- Search -->
        <div class="mt-12 max-w-md mx-auto">
            <div class="relative">
                <input type="text" placeholder="Search for pages..." class="w-full px-6 py-4 pl-12 rounded-full bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 transition-colors">
                <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </div>

    <script>
        // Create particles
        const particlesContainer = document.getElementById('particles-container');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle float';
            particle.style.width = Math.random() * 6 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.opacity = Math.random() * 0.5 + 0.1;
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
            particlesContainer.appendChild(particle);
        }

        // Mouse parallax effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            document.querySelectorAll('.particle').forEach((particle, index) => {
                const speed = (index % 5 + 1) * 0.5;
                particle.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
