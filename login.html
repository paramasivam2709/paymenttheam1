<!-- login.html - Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stackly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }
        .gold-text { background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 50%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .input-field:focus { border-color: #d4af37; outline: none; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
        .floating-label { transition: all 0.3s; }
        .input-field:focus ~ .floating-label, .input-field:not(:placeholder-shown) ~ .floating-label { transform: translateY(-24px) scale(0.85); color: #d4af37; }
        .particle { position: absolute; background: rgba(212, 175, 55, 0.3); border-radius: 50%; pointer-events: none; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="antialiased flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Effects -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-10 w-72 h-72 bg-yellow-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-yellow-600/10 rounded-full blur-3xl"></div>
        <div id="particles-container" class="absolute inset-0"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center space-x-2 group">
                 <img src="image/logo_gold.png" alt="Logo" class="h-10 w-auto">
                <span class="text-3xl font-bold gold-text">Stackly</span>
            </a>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-3xl p-8 shadow-2xl">
            <h1 class="text-2xl font-bold text-center mb-2">Welcome Back</h1>
            <p class="text-gray-400 text-center mb-8">Sign in to access your account</p>

            <form class="space-y-6" onsubmit="loginUser(event)">
                <!-- Login Role -->
            <div class="relative">
            <select id="role"
             class="input-field w-full px-4 py-4 rounded-xl text-white">

             <option value="user">User Login</option>
             <option value="admin">Admin Login</option>

             </select>
             </div>
                <!-- Email -->
                <div class="relative">
                    <input type="email" id="email" placeholder=" " class="input-field w-full px-4 py-4 rounded-xl text-white placeholder-transparent" required>
                    <label for="email" class="floating-label absolute left-4 top-4 text-gray-400 pointer-events-none">Email Address</label>
                </div>

                <!-- Password -->
                <div class="relative">
                    <input type="password" id="password" placeholder=" " class="input-field w-full px-4 py-4 rounded-xl text-white placeholder-transparent" required>
                    <label for="password" class="floating-label absolute left-4 top-4 text-gray-400 pointer-events-none">Password</label>
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-4 text-gray-400 hover:text-white transition-colors">
                        <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </button>
                </div>

                <!-- Remember & Forgot -->
                <div class="flex justify-between items-center text-sm">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-600 text-yellow-500 focus:ring-yellow-500 bg-transparent">
                        <span class="text-gray-400">Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="text-yellow-400 hover:text-yellow-300 transition-colors">Forgot password?</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-bold rounded-xl hover:shadow-lg hover:shadow-yellow-500/40 transform hover:-translate-y-0.5 transition-all">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-[#0a0a0a] text-gray-400">Or continue with</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center space-x-2 p-3 rounded-xl glass hover:bg-white/10 transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    <span class="text-sm">Google</span>
                </button>
                <button class="flex items-center justify-center space-x-2 p-3 rounded-xl glass hover:bg-white/10 transition-all">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/></svg>
                    <span class="text-sm">Apple</span>
                </button>
            </div>

            <!-- Register Link -->
            <p class="text-center mt-8 text-gray-400">
                Don't have an account? 
                <a href="register.html" class="text-yellow-400 hover:text-yellow-300 font-semibold transition-colors">Create one</a>
            </p>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-8">
            <a href="index.html" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center justify-center space-x-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span>Back to home</span>
            </a>
        </div>
    </div>

    <script>
        // Particles
        const particlesContainer = document.getElementById('particles-container');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            particlesContainer.appendChild(particle);
        }

        // Toggle Password
        function togglePassword() {
            const password = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (password.type === 'password') {
                password.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                password.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }

        function loginUser(e){

e.preventDefault()

let role = document.getElementById("role").value
let email = document.getElementById("email").value
let password = document.getElementById("password").value

/* Admin Login */

if(role === "admin" ){

window.location.href = "404.html"

}

/* User Login */

else if(role === "user" ){

window.location.href = "404.html"

}

else{

alert("Invalid login details")

}

}
    </script>
</body>
</html>
