<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#1a1a1a,#2d2d2d,#1a1a1a);
color:white;
}

.login-box{
width:350px;
padding:40px;
background:rgba(255,255,255,0.05);
border-radius:15px;
backdrop-filter:blur(10px);
}

h2{
text-align:center;
margin-bottom:25px;
color:#d4af37;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
outline:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:30px;
background:#d4af37;
color:black;
font-weight:bold;
cursor:pointer;
}

.password-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:14px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form id="loginForm">

<select id="role">

<option value="user">User Login</option>
<option value="admin">Admin Login</option>

</select>

<input
id="username"
type="text"
placeholder="Username"
required>

<div class="password-box">

<input
id="password"
type="password"
placeholder="Password"
required>

<span class="eye" onclick="togglePassword()">👁</span>

</div>

<button type="submit">Login</button>

</form>

</div>

<script>

function togglePassword(){

let pass=document.getElementById("password")

if(pass.type==="password"){

pass.type="text"

}else{

pass.type="password"

}

}


document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault()

let role=document.getElementById("role").value
let user=document.getElementById("username").value
let pass=document.getElementById("password").value


if(role==="admin"){

localStorage.setItem("role","admin")
window.location="admin-dashboard.html"

}

else if(role==="user" ){

localStorage.setItem("role","user")
window.location="user-dashboard.html"

}

else{

alert("Invalid login")

}

})

</script>

</body>
</html>
